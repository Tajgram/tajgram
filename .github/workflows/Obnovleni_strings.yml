name: Cleanup Strings

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_TOKEN }}

      - name: 🧹 Restore Files
        run: |
          # 1. Файли strings.xml-ро ба ҳолати аввалааш бармегардонем
          git checkout origin/master -- TMessagesProj/src/main/res/values/strings.xml
          
          # 2. Файли нолозими strings_to_translate.txt-ро нест мекунем
          rm -f strings_to_translate.txt
          
          # 3. Сабт кардан (сохранит) то ки GitHub ҳам тоза шавад
          git config user.name "TajgramRobot"
          git config user.email "robot@tajgram.tj"
          git add TMessagesProj/src/main/res/values/strings.xml
          
          # Агар тағйирот бошад, сабт мекунад
          git diff-index --quiet HEAD || (git commit -m "Cleanup: Removed unwanted strings" && git push)
