on:
  workflow_dispatch:

jobs:
  patch_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Клони лоиҳа
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_TOKEN }}
          branch: master

      - name: 🧹 Танзими Git
        run: |
          git config --global user.name "TajgramRobot"
          git config --global user.email "robot@tajgram.tj"

      - name: ⚙️ ТOЗА КАРДАН ВА ИҶРOИ ПАТЧҲO (Тавассути sed)
        run: |
          BF_FILE="TMessagesProj/src/main/java/org/telegram/ui/ActionBar/BaseFragment.java"
          CA_FILE="TMessagesProj/src/main/java/org/telegram/ui/ChatActivity.java"
          
          # 1. ТOЗА КАРДАНИ МУТЛАҚ ВА РЕШАКИИ ДУБЛИКАТҲO (Ҳама сатрҳои кӯҳна кати коментҳояшон удалит мешаванд)
          sed -i '/TAJGRAM/d' $BF_FILE
          sed -i '/ANTI_FRAUD/d' $BF_FILE
          sed -i '/currentSignature/d' $BF_FILE
          
          sed -i '/TAJGRAM/d' $CA_FILE
          sed -i '/ANTI_SPY/d' $CA_FILE
          sed -i '/WindowManager.LayoutParams.FLAG_SECURE/d' $CA_FILE

          # 2. НАВИШТАНИ НАВИ ТОЗА БА BaseFragment
          # Коди нави тоза бе ягон дубликат мустақим дар аввали функсия гузошта мешавад
          read -r -d '' BF_CODE << 'EOF' || true
          // === TAJGRAM SECURITY START ===
          if (org.telegram.messenger.BuildVars.ANTI_FRAUD_DEVICE_LOCK) {
              String currentSignature = org.telegram.messenger.AndroidUtilities.getCurrentAppSignature(org.telegram.messenger.ApplicationLoader.applicationContext);
              if (currentSignature != null && !org.telegram.messenger.BuildVars.SHA256_KEY.equalsIgnoreCase(currentSignature)) {
                  return false;
              }
          }
          // === TAJGRAM SECURITY END ===
          EOF
          
          # Фармони sed кодро мустақим ба даруни функсия мегузорад
          sed -i "s/public boolean onFragmentCreate() {/public boolean onFragmentCreate() {\n$BF_CODE/g" $BF_FILE

          # 3. НАВИШТАНИ НАВИ ТОЗА БА ChatActivity (Блоки скриншот)
          read -r -d '' CA_CODE << 'EOF' || true
              // === TAJGRAM SCREENSHOT LOCK START ===
              if (org.telegram.messenger.BuildVars.ANTI_SPY_SCREENSHOT_LOCK) {
                  if (getParentActivity() != null) {
                      getParentActivity().getWindow().addFlags(android.view.WindowManager.LayoutParams.FLAG_SECURE);
                  }
              }
              // === TAJGRAM SCREENSHOT LOCK END ===
          EOF
          
          sed -i "s/public void onResume() {/public void onResume() {\n$CA_CODE/g" $CA_FILE

      - name: 📤 Push ба GitHub
        run: |
          git add .
          git diff-index --quiet HEAD || (git commit -m "Tajgram: Auto-updated Security & API" && git push https://${{ secrets.MY_TOKEN }}@://github.com master)
