name: Build Tajgram Official APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 1. Муайян кардани автоматии JDK (17 ё 21)
      - name: Detect Required JDK Version
        id: detect-jdk
        run: |
          JDK_VER="17"
          if grep -q -E "VERSION_21|JavaLanguageVersion.of\(21\)" build.gradle TMessagesProj/build.gradle 2>/dev/null; then
            JDK_VER="21"
          fi
          echo "SELECTED_JDK=$JDK_VER" >> $GITHUB_OUTPUT

      # 2. Насби автоматӣ Java
      - name: Setup Java (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ steps.detect-jdk.outputs.SELECTED_JDK }}
          cache: 'gradle'

      # 3. Сохтани файлҳои махфии Keystore ва Firebase
      - name: Inject Configuration and Secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          # Сохтани папкаи махфии config, ки Телеграм талаб мекунад
          mkdir -p TMessagesProj/config
          
          # Декод кардани калид ва партофтан ба папкаи config
          if [ ! -z "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > TMessagesProj/config/release.keystore 2>/dev/null
          fi
          
          # Сохтани файли Firebase
          if [ ! -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > TMessagesProj/config/google-services.json
            echo "$GOOGLE_SERVICES_JSON" > google-services.json
          fi

      # 4. Сар додани Билд (Градл паролҳоро худаш аз gradle.properties мехонад)
      - name: Build APK via Gradle
        run: |
          chmod +x gradlew
          echo "Билди Tajgram оғоз шуд. Паролҳо аз асли файл хонда мешаванд..."
          ./gradlew assembleRelease -x lint -x test --no-daemon 2>/dev/null || ./gradlew assembleRelease -x lint -x test --no-daemon

      # 5. Боргурии барномаи тайёр (Artifact)
      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Tajgram-Official-Release
          path: TMessagesProj/build/outputs/apk/release/*.apk
