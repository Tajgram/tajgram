name: Tajgram Pure XML Fixer Only (Assets Branch)

on:
  workflow_dispatch: # Танҳо бо пахши дастӣ, то худкор сохтани APK оғоз наёбад

permissions:
  contents: write

jobs:
  fix_xml_only:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Клони маҳз бранчи assets
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_TOKEN }}
          ref: master # Маҳз бранчи assets

      - name: 🧹 Танзими профили Гит
        run: |
          git config --global user.name "TajgramRobot"
          git config --global user.email "robot@tajgram.tj"

      - name: 🧼 Тафтиш ва ислоҳи автоматӣ барои ТАМОМИ фоизҳои хато дар файли Тоҷикӣ
        run: |
          TG_XML="TMessagesProj/src/main/res/values-tg/strings.xml"
          if [ -f "$TG_XML" ]; then
            echo "Оғози тафтиши куллии 11,000 сатри тоҷикӣ..."
            
            # Ин фармони оқилонаи Perl тамоми файлро мехонад:
            # Агар дар дохили теги <string> якчанд %s ё %d-и оддӣ бошанд,
            # вай онҳоро худкор ва бехатар рақамгузорӣ мекунад: %1$s, %2$s, %1$d ва ғайра.
            # Ба матни тоҷикӣ ва синтаксиси XML умуман зиён намерасонад.
            perl -pi -e '
              if (/<string[^>]*>(.*?)<\/string>/) {
                my $content = $1;
                my $orig = $content;
                my $count = 1;
                $content =~ s/(%[sd])/"%" . $count++ . "\$" . substr($1,1,1)/ge if ($content =~ /(%[sd]).*?%[sd]/);
                s/\Q$orig\E/$content/;
              }
            ' "$TG_XML"
            
            echo "✅ Тамоми фоизҳои хато дар файли тоҷикӣ автоматӣ рақамгузорӣ ва ислоҳ шуданд!"
          fi

      - name: 📝 Иловаи 3 калиди нави англисии Дуров
        run: |
          EN_XML="TMessagesProj/src/main/res/values/strings.xml"
          if [ -f "$EN_XML" ]; then
            # Тоза кардани дубликатҳо агар бошанд
            sed -i '/UseProxyTelegramInfo2/d' "$EN_XML"
            sed -i '/InviteToTelegramShort/d' "$EN_XML"
            sed -i '/NumberNotOnTelegram/d' "$EN_XML"
            
            # Илова кардани калидҳои нави заводӣ ба охири файл
            sed -i '/<\/resources>/i\    <string name="UseProxyTelegramInfo2">This proxy is secure.<\/string>\n    <string name="InviteToTelegramShort">Invite to Tajgram<\/string>\n    <string name="NumberNotOnTelegram">This number is not on Tajgram<\/string>' "$EN_XML"
            echo "✅ Калидҳои нави англисӣ бехатар илова шуданд!"
          fi

      - name: 📤 Push ТАНҲО ба бранчи assets
        run: |
          git add TMessagesProj/src/main/res/values-tg/strings.xml 2>/dev/null || true
          git add TMessagesProj/src/main/res/values/strings.xml 2>/dev/null || true
          
          if git diff-index --quiet HEAD --; then
            echo "Ҳеҷ тағйироте ёфт нашуд, ҳамаи фоизҳо аллакай 100% дурустанд."
          else
            # Иловаи калимаи [skip ci] кафолат медиҳад, ки сохтани APK худкор запуск НАШАВАД!
            git commit -m "Tajgram: Fix placeholders %d and %s globally [skip ci]"
            git pull origin assets --rebase || true
            git push "https://${{ secrets.MY_TOKEN }}@://github.com" HEAD:refs/heads/master
          fi
