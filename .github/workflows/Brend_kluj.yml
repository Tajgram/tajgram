name: Ultimate Permanent Rename and App Branding to Tajgram

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_brand:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Fresh
        uses: actions/checkout@v4
        # Дигар 'ref: master' наменависем, то худи GitHub бранчи ҷории санҷиширо автоматӣ гирад

      # 1. ТАНҲО ДАР ГРАДЛ ПРОПЕРТИЗ НOМИ ПАКЕТ ВА КАЛИДҲOРО ТИБҚИ ТАЛАБОТ ИВАЗ МЕКУНАД
      - name: Inject Tajgram Configuration to gradle.properties
        run: |
          if [ -f gradle.properties ]; then
            sed -i 's|^APP_PACKAGE=.*|APP_PACKAGE=org.tajgram.messenger|g' gradle.properties
            sed -i 's|^RELEASE_KEY_PASSWORD=.*|RELEASE_KEY_PASSWORD=android|g' gradle.properties
            sed -i 's|^RELEASE_KEY_ALIAS=.*|RELEASE_KEY_ALIAS=tajgram_key|g' gradle.properties
            sed -i 's|^RELEASE_STORE_PASSWORD=.*|RELEASE_STORE_PASSWORD=android|g' gradle.properties
          fi

      # 2. ИВАЗ КАРДАНИ ТАМОМИ ЗАБОНҲО ДАР STRINGS.XML (БЕ ХАРОБ КАРДАНИ КАЛИДҲО ВА САНҶИШИ ДУБЛИКАТ)
      - name: Global Safe Case-Insensitive and Multi-Language Rename
        run: |
          # Ёфтани тамоми файлҳои strings.xml
          find . -type f -name "strings.xml" | while read -r file; do
            echo "Коркарди файл: $file"
            
            # Танҳо сатрҳоеро коркард мекунем, ки дар байни тирчаҳо (матни XML) мебошанд ва калидҳоро (name="...") ламс намекунанд.
            # Бо истифода аз аломати '|' ҳамчун сепаратор дар sed, то хатогии аломатҳои махсус пешгирӣ шавад.
            
            # 1. Ивази Telegram Premium ба Tajgram Premium VIP
            sed -i -E 's|(>[^<]*)[Tt][Ee][Ll][Ee][Gg][Rr][Aa][Mm]\s+[Pp][Rr][Ee][Mm][Ii][Uu][Mm]([^<]*<)|\1Tajgram Premium VIP\2|g' "$file"
            
            # 2. Ивази калимаи лотинии Telegram ба Tajgram
            sed -i -E 's|(>[^<]*)[Tt][Ee][Ll][Ee][Gg][Rr][Aa][Mm]([^<]*<)|\1Tajgram\2|g' "$file"
            
            # 3. Ивази калима бо забони Арабӣ (تیليجرام)
            sed -i -E 's|(>[^<]*)تیليجرام([^<]*<)|\1Tajgram\2|g' "$file"
            
            # 4. Ивази калима бо забони Форсӣ (تلگرام)
            sed -i -E 's|(>[^<]*)تلگرام([^<]*<)|\1Tajgram\2|g' "$file"

            # 5. Ивази калима бо забони Хитоӣ (电报)
            sed -i -E 's|(>[^<]*)电报([^<]*<)|\1Tajgram\2|g' "$file"
            
            # ЗАШИТА АЗ ДУБЛИКАТ (Ислоҳи дубликатҳои эҳтимолӣ, агар матн якчанд бор иваз шуда бошад)
            sed -i 's/Tajgram Premium VIP Premium VIP/Tajgram Premium VIP/g' "$file"
            sed -i 's/Tajgram Premium VIP Premium/Tajgram Premium VIP/g' "$file"
            sed -i 's/Tajgram Premium VIP VIP/Tajgram Premium VIP/g' "$file"
            sed -i 's/Tajgram Tajgram/Tajgram/g' "$file"
          done

      # 3. САБТ ВА ПУШ КАРДАНИ ТАҒЙИРОТҲО БА ҲАМОН БРАНЧЕ КИ САНҶИШ ДОРАД
      - name: Commit and Push Changes Safely
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Илова кардани файлҳо барои сабт
          git add gradle.properties
          find . -type f -name "strings.xml" -exec git add {} +
          
          # Санҷиш: Агар тағйирот бошад, сабт ва пуш мекунад
          if git diff-index --quiet HEAD --; then
            echo "Ҳеҷ тағйироте ёфт нашуд. Ниёз ба сабт нест."
          else
            git commit -m "🚀 TAJGRAM BRANDING OVERHAUL: Complete multi-language text renaming with key protection"
            # Пулл мекунем то хатогии [rejected] такрор нашавад ва ба ҳамон бранчи ҷорӣ пуш мекунем
            git pull origin ${{ github.ref_name }} --rebase || true
            git push origin HEAD:${{ github.ref }}
          fi
