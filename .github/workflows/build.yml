name: Build

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '!.github/workflows/build.yml'
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_HARDLINK: "true"
      CCACHE_NOHASHDIR: "true"
      CCACHE_MAXSIZE: "10G"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "build-tools;36.1.0 ndk;27.3.13750724 platforms;android-36"

      - name: Configure Gradle
        run: |
          mkdir -p ~/.gradle
          echo 'org.gradle.caching=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.parallel=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.jvmargs=-Xmx8192m -Dfile.encoding=UTF-8 -XX:+UseParallelGC' >> ~/.gradle/gradle.properties
          echo 'android.native.buildOutput=verbose' >> ~/.gradle/gradle.properties
      
      - name: Configure Signing
        run: |
          # САНҶИШИ СУҒУРТАВИИ КЕЙСТОР (ПАЙВАСТ КАРДАНИ ҲАРДУ ВАРИАНТ)
          REPO_KEYSTORE="${{ github.workspace }}/TMessagesProj/config/release.keystore"
          
          if [ -f "$REPO_KEYSTORE" ]; then
            echo "✅ Варианти 1: Файли Keystore дар папкаи лоиҳа ёфт шуд!"
            echo "storeFile=$REPO_KEYSTORE" >> local.properties
            # Барои он ки қадами Show SHA хато надиҳад, файлро ба ин ҷо ҳам нусхабардорӣ мекунем
            cp "$REPO_KEYSTORE" "${{ github.workspace }}/keystore.base64"
          else
            echo "⚠️ Варианти 2: Файл дар папка нест. Сохтани Keystore аз Base64 (Secrets)..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/keystore.base64
            echo "storeFile=${{ github.workspace }}/keystore.base64" >> local.properties
          fi

          echo "storePassword=${{ secrets.RELEASE_STORE_PASSWORD }}" >> local.properties
          echo "keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}" >> local.properties
          echo "keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}" >> local.properties
          
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > TMessagesProj/google-services.json
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > TMessagesProj_App/google-services.json
         
          # Хондани сирҳо аз Secrets ва иваз кардани мустақим дар дохили BuildVars.java
          REAL_ID=$(echo '${{ secrets.API_ID_BASE64 }}' | base64 --decode)
          REAL_HASH=$(echo '${{ secrets.API_HASH_BASE64 }}' | base64 --decode)
          REAL_SHA256=$(echo '${{ secrets.SHA256_BASE64 }}' | base64 --decode)
          
          BV_FILE="TMessagesProj/src/main/java/org/telegram/messenger/BuildVars.java"
          sed -i "s/APP_ID = 999999/APP_ID = $REAL_ID/g" $BV_FILE
          sed -i "s/APP_HASH = \"SECRET_HASH_PLACEHOLDER\"/APP_HASH = \"$REAL_HASH\"/g" $BV_FILE
          sed -i "s/SHA256_KEY = \"SECRET_SHA256_PLACEHOLDER\"/SHA256_KEY = \"$REAL_SHA256\"/g" $BV_FILE
      
      - name: Show SHA Fingerprints
        run: |
          CURRENT_KEYSTORE=$(grep "storeFile=" local.properties | cut -d'=' -f2)
          keytool -list -v -keystore "$CURRENT_KEYSTORE" -storepass "${{ secrets.RELEASE_STORE_PASSWORD }}" | grep -E "SHA1:|SHA256:"
      
      - name: Build with Gradle
        run: |
          ./gradlew clean
          ./gradlew assembleRelease
          ./gradlew bundlePlay
          ./gradlew sentryUploadSourceBundlePlay
      - name: Attest
        uses: actions/attest@v4
        with:
          subject-path: '${{ github.workspace }}/TMessagesProj_App/build/outputs'

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: outputs
          path: TMessagesProj_App/build/outputs

      - name: Upload arm64-v8a build apk
        uses: actions/upload-artifact@v7
        with:
          path: TMessagesProj_App/build/outputs/apk/release/*-arm64-v8a.apk
          archive: false

      - name: Upload armeabi-v7a build apk
        uses: actions/upload-artifact@v7
        with:
          path: TMessagesProj_App/build/outputs/apk/release/*-armeabi-v7a.apk
          archive: false

      - name: Upload universal build apk
        uses: actions/upload-artifact@v7
        with:
          path: TMessagesProj_App/build/outputs/apk/release/*-universal.apk
          archive: false

      - name: Upload x86 build apk
        uses: actions/upload-artifact@v7
        with:
          path: TMessagesProj_App/build/outputs/apk/release/*-x86.apk
          archive: false

      - name: Upload x86_64 build apk
        uses: actions/upload-artifact@v7
        with:
          path: TMessagesProj_App/build/outputs/apk/release/*-x86_64.apk
          archive: false

      - name: Upload build bundle
        uses: actions/upload-artifact@v7
        with:
          path: TMessagesProj_App/build/outputs/bundle/play/*-play.aab
          archive: false
