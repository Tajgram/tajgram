name: Tajgram Auto Update and Patching

on:
  workflow_dispatch:

jobs:
  patch_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Клони лоиҳа
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_TOKEN }}
          branch: master

      - name: 🐍 Насби Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🧹 Танзими Git
        run: |
          git config --global user.name "TajgramRobot"
          git config --global user.email "robot@tajgram.tj"

      - name: ⚙️ Иҷрои Патчҳо ва Навсозии API
        run: |
          python3 - <<EOF
          import os
          import re
          
          # 1. BaseFragment
          bf_path = "TMessagesProj/src/main/java/org/telegram/ui/ActionBar/BaseFragment.java"
          bf_code = """// === TAJGRAM SECURITY START ===
          if (org.telegram.messenger.BuildVars.ANTI_FRAUD_DEVICE_LOCK) {
              String currentSignature = org.telegram.messenger.AndroidUtilities.getCurrentAppSignature(org.telegram.messenger.ApplicationLoader.applicationContext);
              if (currentSignature != null && !org.telegram.messenger.BuildVars.SHA256_KEY.equalsIgnoreCase(currentSignature)) {
                  return false;
              }
          }
          // === TAJGRAM SECURITY END ==="""
          
          if os.path.exists(bf_path):
              with open(bf_path, "r", encoding="utf-8") as f:
                  content = f.read()
              
              # Тоза кардани ҳама намуди комментҳои хатои кӯҳна (ҳам бо #, ҳам бо //, ҳам бо === ва ---)
              content = re.sub(r'[/#]\s*[-=]+\s*TAJGRAM\s*SECURITY\s*START.*?[-=]*\n', '', content, flags=re.IGNORECASE)
              content = re.sub(r'[/#]\s*[-=]+\s*TAJGRAM\s*SECURITY\s*END.*?[-=]*\n', '', content, flags=re.IGNORECASE)
              content = re.sub(r'if\s*\(\s*org\.telegram\.messenger\.BuildVars\.ANTI_FRAUD_DEVICE_LOCK.*?\}\s*\}', '', content, flags=re.DOTALL)
              
              # Барқарор кардани функсия ба ҳолати аслӣ ва гузоштани коди ягонаи тоза
              content = re.sub(r'public boolean onFragmentCreate\(\)\s*\{\s*', 'public boolean onFragmentCreate() {\n', content)
              content = content.replace("public boolean onFragmentCreate() {\n", "public boolean onFragmentCreate() {\n" + bf_code + "\n")
              
              with open(bf_path, "w", encoding="utf-8") as f:
                  f.write(content)
          
          # 2. ChatActivity
          ca_path = "TMessagesProj/src/main/java/org/telegram/ui/ChatActivity.java"
          ca_code = """\n    // === TAJGRAM SCREENSHOT LOCK START ===
              if (org.telegram.messenger.BuildVars.ANTI_SPY_SCREENSHOT_LOCK) {
                  if (getParentActivity() != null) {
                      getParentActivity().getWindow().addFlags(android.view.WindowManager.LayoutParams.FLAG_SECURE);
                  }
              }
              // === TAJGRAM SCREENSHOT LOCK END ==="""
              
          if os.path.exists(ca_path):
              with open(ca_path, "r", encoding="utf-8") as f:
                  content = f.read()
              
              # Тоза кардани ҳама намуди блокҳои скриншот локи кӯҳна
              content = re.sub(r'[/#]\s*[-=]+\s*TAJGRAM\s*SCREENSHOT\s*LOCK\s*START.*?[-=]*\n', '', content, flags=re.DOTALL | re.IGNORECASE)
              content = re.sub(r'[/#]\s*[-=]+\s*TAJGRAM\s*SCREENSHOT\s*LOCK\s*END.*?[-=]*\n', '', content, flags=re.DOTALL | re.IGNORECASE)
              content = re.sub(r'if\s*\(\s*org\.telegram\.messenger\.BuildVars\.ANTI_SPY_SCREENSHOT_LOCK.*?\}\s*\}', '', content, flags=re.DOTALL)
              
              # Тоза кардани фосилаҳо дар гирду атрофи super.onResume() ва гузоштани код
              content = re.sub(r'\s*super\.onResume\(\);\s*', '\n        super.onResume();\n', content)
              content = content.replace("super.onResume();", "super.onResume();" + ca_code)
              
              with open(ca_path, "w", encoding="utf-8") as f:
                  f.write(content)
          EOF

      - name: 📤 Push ба GitHub
        run: |
          git add .
            git diff-index --quiet HEAD || (git commit -m "Tajgram: Auto-updated Security & API" && git push https://${{ secrets.MY_TOKEN }}@github.com/Tajgram/tajgram.git master)
