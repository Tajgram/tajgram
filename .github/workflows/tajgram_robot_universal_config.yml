name: Tajgram Auto Update and Patching

on:
  workflow_dispatch:

jobs:
  patch_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Клони лоиҳа
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_TOKEN }}
          branch: master

      - name: 🐍 Насби Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🧹 Танзими Git
        run: |
          git config --global user.name "TajgramRobot"
          git config --global user.email "robot@tajgram.tj"

      - name: ⚙️ Иҷрои Патчҳо ва Навсозии API
        run: |
          python3 - <<EOF
          import os
          import re

          # 1. Патчи BaseFragment
          bf_path = "TMessagesProj/src/main/java/org/telegram/ui/ActionBar/BaseFragment.java"
          bf_code = """
          // === TAJGRAM SECURITY START ===
          if (org.telegram.messenger.BuildVars.ANTI_FRAUD_DEVICE_LOCK) {
              String currentSignature = org.telegram.messenger.AndroidUtilities.getCurrentAppSignature(org.telegram.messenger.ApplicationLoader.applicationContext);
              if (!org.telegram.messenger.BuildVars.SHA256_SECURITY_LOCK.equalsIgnoreCase(currentSignature)) {
                  return false;
              }
          }
          // === TAJGRAM SECURITY END ==="""
          
          if os.path.exists(bf_path):
              with open(bf_path, "r", encoding="utf-8") as f: content = f.read()
              if "TAJGRAM SECURITY START" not in content:
                  content = content.replace("public boolean onFragmentCreate() {", "public boolean onFragmentCreate() {\n" + bf_code)
                  with open(bf_path, "w", encoding="utf-8") as f: f.write(content)

          # 2. Патчи ChatActivity
          ca_path = "TMessagesProj/src/main/java/org/telegram/ui/ChatActivity.java"
          ca_code = """
              // === TAJGRAM SCREENSHOT LOCK START ===
              if (org.telegram.messenger.BuildVars.ANTI_SPY_SCREENSHOT_LOCK) {
                  if (getParentActivity() != null) {
                      getParentActivity().getWindow().addFlags(android.view.WindowManager.LayoutParams.FLAG_SECURE);
                  }
              }
              // === TAJGRAM SCREENSHOT LOCK END ==="""
              
          if os.path.exists(ca_path):
              with open(ca_path, "r", encoding="utf-8") as f: content = f.read()
              if "TAJGRAM SCREENSHOT LOCK START" not in content:
                  content = content.replace("public void onResume() {", "public void onResume() {\n" + ca_code)
                  with open(ca_path, "w", encoding="utf-8") as f: f.write(content)

          # 3. Патчи ДАҚИҚИ LocaleController (Дар ҷои мувофиқи боло, барои ҳифзи 3 қавси охир)
          lc_path = "TMessagesProj/src/main/java/org/telegram/messenger/LocaleController.java"
          if os.path.exists(lc_path):
              with open(lc_path, "r", encoding="utf-8") as f: content = f.read()
              
              # Санҷиш аз дубликат: агар код аллакай набошад
              if "getCurrentLanguageCode" not in content:
                  # Робот маҳз болои RelativeIcu-ро меёбад ва коди тоҷикиро мешинонад
                  if "public static class RelativeIcu" in content:
                      content = content.replace(
                          "public static class RelativeIcu",
                          "public String getCurrentLanguageCode() {\n        return \"tg\";\n    }\n\n    public static class RelativeIcu"
                      )
                      with open(lc_path, "w", encoding="utf-8") as f: f.write(content)
                      print("✅ LocaleController дар ҷои мувофиқи боло патч шуд. 3 қавси охир бетағйир монд.")
              else:
                  print("ℹ️ Патчи LocaleController аллакай ҳаст, дубликат сохта нашуд.")

          # 4. Навсозии BuildVars.java (Ҷои API_ID ва API_HASH)
          bv_path = "TMessagesProj/src/main/java/org/telegram/messenger/BuildVars.java"
          if os.path.exists(bv_path):
              with open(bv_path, "r", encoding="utf-8") as f: content = f.read()
              content = re.sub(r'public static int APP_ID = \d+;', 'public static int APP_ID = 39951434;', content)
              content = re.sub(r'public static String APP_HASH = "[^"]+";', 'public static String APP_HASH = "fcf607bae206cefb2930121a86459c4b";', content)
              with open(bv_path, "w", encoding="utf-8") as f: f.write(content)
          EOF

      - name: 📤 Push ба GitHub
        run: |
          git add .
          git diff-index --quiet HEAD || (git commit -m "Tajgram: Auto-updated Security & API" && git push https://${{ secrets.MY_TOKEN }}@github.com/saidjun/tajgram.git master)
