name: Cleanup Strings

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_TOKEN }}
          fetch-depth: 0 # Барои дуруст кор кардани git reset

      - name: 🧹 Restore & Cleanup
        run: |
          # 1. Танзимоти Git
          git config user.name "TajgramRobot"
          git config user.email "robot@tajgram.tj"

          # 2. Файлҳои нолозимро нест мекунем
          rm -f strings_to_translate.txt
          
          # 3. Барқарор кардани strings.xml (аз версияи охирини дуруст)
          # Агар remote master аллакай "ифлос" бошад, ту бояд ба ҷои 'origin/master'
          # ID-и коммити тозаро (масалан 15c2c35c) нависӣ
          git checkout origin/master -- TMessagesProj/src/main/res/values/strings.xml
          
          # 4. Санҷиши тағйирот ва сабт (Commit)
          # 'git diff --quiet' месанҷад, ки оё файл тағйир ёфтааст ё не
          if ! git diff --quiet TMessagesProj/src/main/res/values/strings.xml; then
            git add TMessagesProj/src/main/res/values/strings.xml
            git commit -m "Cleanup: Removed unwanted strings"
            git push
          else
            echo "✅ Файл аллакай тоза аст, чизе барои сабт нест."
          fi
