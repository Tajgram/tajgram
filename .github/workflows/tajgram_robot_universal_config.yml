name: Tajgram Auto Update and Patching

on:
  workflow_dispatch:

jobs:
  patch_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Клони лоиҳа
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_TOKEN }}
          branch: master

      - name: 🐍 Насби Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🧹 Танзими Git
        run: |
          git config --global user.name "TajgramRobot"
          git config --global user.email "robot@tajgram.tj"

      - name: ⚙️ Иҷрои Патчҳо ва Навсозии API
        run: |
          python3 - <<EOF
          import os

          # Кодҳои бехатарии Таҷграм
          bf_code = """// === TAJGRAM SECURITY START ===
              if (org.telegram.messenger.BuildVars.ANTI_FRAUD_DEVICE_LOCK) {
                  String currentSignature = "";
                  try {
                      android.content.pm.PackageInfo packageInfo = org.telegram.messenger.ApplicationLoader.applicationContext.getPackageManager().getPackageInfo(org.telegram.messenger.ApplicationLoader.applicationContext.getPackageName(), android.content.pm.PackageManager.GET_SIGNATURES);
                      for (android.content.pm.Signature signature : packageInfo.signatures) {
                          java.security.MessageDigest md = java.security.MessageDigest.getInstance("SHA-256");
                          md.update(signature.toByteArray());
                          byte[] digest = md.digest();
                          StringBuilder toHex = new StringBuilder();
                          for (byte b : digest) {
                              toHex.append(String.format("%02x", b));
                          }
                          currentSignature = toHex.toString();
                          break;
                      }
                  } catch (Exception e) {
                      currentSignature = null;
                  }
                  if (currentSignature != null && !org.telegram.messenger.BuildVars.SHA256_KEY.equalsIgnoreCase(currentSignature)) {
                      return false;
                  }
              }
              // === TAJGRAM SECURITY END ===\n"""

          ca_code = """// === TAJGRAM SCREENSHOT LOCK START ===
              if (org.telegram.messenger.BuildVars.ANTI_SPY_SCREENSHOT_LOCK) {
                  if (getParentActivity() != null) {
                      getParentActivity().getWindow().addFlags(android.view.WindowManager.LayoutParams.FLAG_SECURE);
                  }
              }
              // === TAJGRAM SCREENSHOT LOCK END ===\n"""

          # ==========================================
          # 1. ИСЛОҲИ ТОЗАИ BaseFragment.java
          # ==========================================
          bf_path = "TMessagesProj/src/main/java/org/telegram/ui/ActionBar/BaseFragment.java"
          if os.path.exists(bf_path):
              with open(bf_path, "r", encoding="utf-8") as f:
                  lines = f.readlines()
              
              clean_lines = []
              skip = False
              for line in lines:
                  # Сатрҳои муноқишаи Гит ва кодҳои кӯҳнаро комилан мепартоем
                  if "<<<<<<<" in line or "=======" in line or ">>>>>>>" in line:
                      continue
                  if "TAJGRAM SECURITY START" in line or "ANTI_FRAUD_DEVICE_LOCK" in line:
                      skip = True
                      continue
                  if "TAJGRAM SECURITY END" in line:
                      skip = False
                      continue
                  if skip:
                      continue
                  clean_lines.append(line)
              
              # Акнун коди тозаро дар ҷои аввали функсия мешинонем
              final_lines = []
              for line in clean_lines:
                  final_lines.append(line)
                  if "public boolean onFragmentCreate()" in line and "{" in line:
                      final_lines.append(bf_code)
              
              with open(bf_path, "w", encoding="utf-8") as f:
                  f.writelines(final_lines)
              print("✅ BaseFragment ПУРРА ТОЗА ВА АЗ НАВ НАВИШТА ШУД!")

          # ==========================================
          # 2. ИСЛОҲИ ТОЗАИ ChatActivity.java
          # ==========================================
          ca_path = "TMessagesProj/src/main/java/org/telegram/ui/ChatActivity.java"
          if os.path.exists(ca_path):
              with open(ca_path, "r", encoding="utf-8") as f:
                  lines = f.readlines()
              
              clean_lines = []
              skip = False
              for line in lines:
                  # Сатрҳои муноқишаи Гит ва кодҳои кӯҳнаро комилан мепартоем
                  if "<<<<<<<" in line or "=======" in line or ">>>>>>>" in line:
                      continue
                  if "TAJGRAM SCREENSHOT LOCK START" in line or "ANTI_SPY_SCREENSHOT_LOCK" in line:
                      skip = True
                      continue
                  if "TAJGRAM SCREENSHOT LOCK END" in line:
                      skip = False
                      continue
                  if skip:
                      continue
                  clean_lines.append(line)
              
              # Кодро рост дар зери onResume мешинонем
              final_lines = []
              patched = False
              for line in clean_lines:
                  final_lines.append(line)
                  if "public void onResume()" in line and not patched:
                      # Ҷустуҷӯи super.onResume() дар сатрҳои наздиктарин
                      final_lines.append(line) 
                  if "super.onResume();" in line and not patched:
                      final_lines.append(ca_code)
                      patched = True # Танҳо як маротиба мешинонад
              
              with open(ca_path, "w", encoding="utf-8") as f:
                  f.writelines(final_lines)
              print("✅ ChatActivity ПУРРА ТОЗА ВА АЗ НАВ НАВИШТА ШУД!")
          EOF

      - name: 📤 Push ба GitHub
        run: |
          git add .
          if git diff-index --quiet HEAD --; then
            echo "Ҳеҷ тағйироте нест, ниёз ба пуш нест."
          else
            git commit -m "Tajgram: Hard cleanup of merge conflicts and fresh patch rewrite"
            git pull origin master --rebase || true
            git push https://${{ secrets.MY_TOKEN }}@://github.com master
          fi
