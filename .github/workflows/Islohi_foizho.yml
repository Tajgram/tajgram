name: Tajgram Pure XML Fixer Only (Master Branch)

on:
  workflow_dispatch: # Танҳо бо пахши дастӣ аз бахши Actions

permissions:
  contents: write

jobs:
  fix_xml_only:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Клони маҳз бранчи master
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_TOKEN }}
          ref: master # Кор ТАНҲО дар бранчи master меравад

      - name: 🧹 Танзими профили Гит
        run: |
          git config --global user.name "TajgramRobot"
          git config --global user.email "robot@tajgram.tj"

      - name: 🧼 Тафтиши Ҳушёронаи Тамоми Сатрҳо (Аз 0 то 100%) ва Ислоҳи Фоизҳо
        run: |
          TG_XML="TMessagesProj/src/main/res/values-tg/strings.xml"
          if [ -f "$TG_XML" ]; then
            echo "Оғози тафтиши куллии 11,000 сатри тоҷикӣ..."
            
            # Файли муваққатӣ месозем
            TEMP_XML="TMessagesProj/src/main/res/values-tg/strings_temp.xml"
            
            # Ин фармони оқилонаи awk тамоми файлро аз 0 то 100% сатр ба сатр мехонад:
            # Агар дар дохили як сатр зиёда аз як аломати фоизи оддии %s ё %d бошад,
            # вай онҳоро худкор ва бехатар рақамгузорӣ мекунад: %1$s, %2$s, %3$s ва ғайра.
            # Шарти АНТИ-ДУБЛИКАТ: Агар сатр аллакай дуруст бошад, ба он умуман даст намезанад.
            awk '
            {
              if ($0 ~ /<string[^>]*>.*%[sd].*%[sd].*<\/string>/) {
                line = $0
                count = 1
                while (match(line, /%[sd]/)) {
                  fmt = substr(line, RSTART, RLENGTH)
                  sub(/%[sd]/, "%" count "$" substr(fmt, 2, 1), line)
                  count++
                }
                print line
              } else {
                print $0
              }
            }' "$TG_XML" > "$TEMP_XML"
            
            # Файли ислоҳшударо ҷои файли кӯҳна мегузорем
            mv "$TEMP_XML" "$TG_XML"
            echo "✅ Тамоми 11,000 сатр аз 0 то 100% тафтиш ва фоизҳои хато автоматӣ ислоҳ шуданд!"
          fi

      - name: 📤 Push тағйироти фоизҳо ба бранчи master
        run: |
          git add TMessagesProj/src/main/res/values-tg/strings.xml 2>/dev/null || true
          
          if git diff-index --quiet HEAD --; then
            echo "Ҳеҷ тағйироте ёфт нашуд, тамоми фоизҳо дар лоиҳа аллакай 100% дурустанд."
          else
            # Калимаи [skip ci] намегузорад, ки сохтани APK худкор запуск шавад
            git commit -m "Tajgram: Comprehensive 100% placeholder fix (%d and %s) [skip ci]"
            git pull origin master --rebase || true
            git push https://${{ secrets.MY_TOKEN }}@github.com/Tajgram/tajgram.git master
          fi
