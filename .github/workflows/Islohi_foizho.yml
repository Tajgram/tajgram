name: Tajgram Pure XML Fixer Only (Master Branch)

on:
  workflow_dispatch: # Танҳо бо пахши дастӣ аз бахши Actions

permissions:
  contents: write

jobs:
  fix_xml_only:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Клони маҳз бранчи master
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_TOKEN }}
          ref: master

      - name: 🧹 Танзими профили Гит
        run: |
          git config --global user.name "TajgramRobot"
          git config --global user.email "robot@tajgram.tj"

      - name: 🐍 Тафтиши Ҳушёрона ва Рақамгузории Тартибӣ (1, 2, 3...)
        shell: python
        run: |
          import os
          import re

          files_to_fix = [
              "TMessagesProj/src/main/res/values-tg/strings.xml",
              "TMessagesProj/src/main/res/values/strings.xml"
          ]

          def fix_placeholders_smart(text):
              if not text:
                  return text
              
              # Регекси касбӣ: Ҳам форматҳои оддии %s, %d ва ҳам форматҳои аллакай нумеронии %1$s, %2$d-ро меёбад
              pattern = re.compile(r'%([0-9]+\$)?([a-zA-Z])')
              matches = list(pattern.finditer(text))
              
              # ШАРТИ ТУ: Агар дар сатр умуман тағйирёбанда НАБОШАД, аз пеши худ ҳеҷ чиз намекунем ва мегузарем
              if not matches:
                  return text
              
              # Агар тағйирёбандаҳо бошанд (1, 2, 3 ё зиёда аз он), онҳоро қатъӣ сатр ба сатр рақам мегузорем
              output = []
              last_end = 0
              counter = 1
              
              for match in matches:
                  start, end = match.start(), match.end()
                  output.append(text[last_end:start])
                  
                  # Ҳарфи тағйирёбандаро мегирем (s, d, f ва ғайра)
                  fmt_char = match.group(2)
                  
                  # Рақамгузории автоматӣ ва дақиқ: %1$s, %2$s, %3$s ё %1$d, %2$d, %3$d...
                  output.append(f"%{counter}${fmt_char}")
                  counter += 1
                  last_end = end
                  
              output.append(text[last_end:])
              return "".join(output)

          for file_path in files_to_fix:
              if not os.path.exists(file_path):
                  print(f"⚠️ Файл ёфт нашуд, гузаштем: {file_path}")
                  continue

              print(f"🚀 Оғози тафтиши куллии 11,000 сатр дар: {file_path}")
              
              with open(file_path, 'r', encoding='utf-8') as f:
                  content = f.read()

              # Регекс барои пурра гирифтани тегҳои <string>...</string> ҳатто агар чанд сатр бошанд
              string_pattern = re.compile(r'(<string[^>]*name="([^"]+)"[^>]*>)(.*?)(</string>)', re.DOTALL)
              
              seen_names = set()
              # Барои гурехтан аз хатои синтаксисии nonlocal, ҳисобкунакро дар массив месозем
              stats = {"duplicates_removed": 0, "fixed_count": 0}

              def replacer(match):
                  full_open_tag = match.group(1)
                  string_name = match.group(2)
                  inner_text = match.group(3)
                  close_tag = match.group(4)

                  # ШАРТИ АНТИ-ДУБЛИКАТ: Агар номи сатр такрорӣ ояд, онро тоза мекунем
                  if string_name in seen_names:
                      stats["duplicates_removed"] += 1
                      return ""
                  seen_names.add(string_name)

                  # Тафтиш ва рақамгузории соф (1-2-3) танҳо барои ҳамонҳое, ки тағйирёбанда доранд
                  fixed_text = fix_placeholders_smart(inner_text)
                  
                  if fixed_text != inner_text:
                      stats["fixed_count"] += 1

                  # Агар дар матн фоизи оддии '%' бошад (масалан 100%) ва он формат набошад, 
                  # ба тег formatted="false" илова мекунем, то Gradle хато надиҳад
                  if "%" in fixed_text and not "$" in fixed_text:
                      if 'formatted="false"' not in full_open_tag:
                          full_open_tag = full_open_tag.replace('>', ' formatted="false">')

                  return f"{full_open_tag}{fixed_text}{close_tag}"

              fixed_content = string_pattern.sub(replacer, content)

              with open(file_path, 'w', encoding='utf-8') as f:
                  f.write(fixed_content)
                  
              print(f"✅ Готово! Файл пурра тафтиш шуд. Ислоҳ шуд: {stats['fixed_count']}, Дубликатҳо: {stats['duplicates_removed']}")

      - name: 📤 Push тағйироти фоизҳо ба бранчи master
        run: |
          git add TMessagesProj/src/main/res/values-tg/strings.xml 2>/dev/null || true
          git add TMessagesProj/src/main/res/values/strings.xml 2>/dev/null || true
          
          if git diff-index --quiet HEAD --; then
            echo "Ҳеҷ тағйироте ёфт нашуд, тамоми сатрҳо аллакай 100% дуруст ва созанд."
          else
            git commit -m "Tajgram: Sequential format fixed (1-2-3) and strings verified [skip ci]"
            git pull origin master --rebase || true
            git push https://${{ secrets.MY_TOKEN }}@github.com/Tajgram/tajgram.git master
          fi
