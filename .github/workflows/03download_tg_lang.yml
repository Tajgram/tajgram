name: Tajgram Intelligent Language Auto-Translator
on:
  workflow_dispatch: # Ту метавонӣ инро дар кодом бранче, ки хоҳӣ, аз сайти GitHub запуск кунӣ

permissions:
  contents: write

jobs:
  translate_lang:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Tajgram Repository
      uses: actions/checkout@v4
      with:
        clean: false
        token: ${{ secrets.MY_TOKEN }} # Истифодаи токени ту барои ҳамаи бранчҳо

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Translation Dependencies
      run: |
        pip install deep-translator lxml

    - name: Run Massive 15k Translation Engine with Grammar Matrix
      shell: python
      run: |
        import os
        import re
        from deep_translator import GoogleTranslator
        from lxml import etree
        import time

        source_file = 'TMessagesProj/src/main/res/values/strings.xml'
        target_dir = 'TMessagesProj/src/main/res/values-tg'
        target_file = os.path.join(target_dir, 'strings.xml')

        if not os.path.exists(target_dir):
            os.makedirs(target_dir)

        translator = GoogleTranslator(source='en', target='tg')

        translation_cache = {}

        grammar_dictionary = {
            "your phone number": "Рақами телефони шумо",
            "phone number": "рақами телефон",
            "message sent": "Паём фиристода шуд",
            "verification code": "Коди тасдиқ",
            "enter code": "Кодро ворид кунед",
            "connection error": "Хатогии пайвастшавӣ",
            "settings": "Танзимот",
            "support": "Дастгирӣ",
            "wallet": "Ҳамён",
            "balance": "Тавозун"
        }

        print("=== 🤖 STARTING MASSIVE 15K TRANSLATION WITH AI CODE SHIELD ===")
        
        parser = etree.XMLParser(strip_cdata=False, recover=True, resolve_entities=False)
        tree = etree.parse(source_file, parser=parser)
        root = tree.getroot()

        count = 0

        for elem in root.findall('string'):
            attr_name = elem.get('name')
            
            if attr_name == "LanguageCode":
                elem.text = "tg"
                continue
            if attr_name == "LanguageName":
                elem.text = "Тоҷикӣ"
                continue
            if attr_name == "LanguageNameInEnglish":
                elem.text = "Tajik"
                continue
                
            if elem.text and len(elem.text.strip()) > 0:
                original_text = elem.text
                clean_lower_text = original_text.lower().strip()
                
                if clean_lower_text in grammar_dictionary:
                    elem.text = grammar_dictionary[clean_lower_text]
                    continue

                placeholder_pattern = re.compile(r'(%[0-9]+\$[a-zA-Z]|%[a-zA-Z]|\n|\\n|\\t|\\\'|\\\"|\*\*.*?\*\*)')
                placeholders = placeholder_pattern.findall(original_text)
                
                protected_text = original_text
                mapping = {}
                for i, ph in enumerate(placeholders):
                    ph_key = f"_PH{i}_"
                    mapping[ph_key] = ph
                    protected_text = protected_text.replace(ph, ph_key, 1)

                if protected_text in translation_cache:
                    translated = translation_cache[protected_text]
                else:
                    try:
                        translated = translator.translate(protected_text)
                        if not translated:
                            translated = protected_text
                        translation_cache[protected_text] = translated
                        time.sleep(0.02)
                    except Exception as e:
                        print(f"⚠️ Google Limit Warning, waiting... Line: {attr_name}")
                        time.sleep(2)
                        try:
                            translated = translator.translate(protected_text)
                        except:
                            translated = protected_text

                for ph_key, ph_val in mapping.items():
                    translated = re.sub(r'_\s*PH\s*' + re.escape(ph_key[3:-1]) + r'\s*_', ph_key, translated)
                    translated = translated.replace(ph_key, ph_val)

                if not any(x in translated.lower() for x in ['telegram.org', 'tg://', 't.me', 'telegramshort', 'telegram_']):
                    translated = re.sub(r'\bTelegram\b', 'Tajgram', translated, flags=re.IGNORECASE)
                    translated = re.sub(r'\bТелеграм\b', 'Таҷграм', translated, flags=re.IGNORECASE)
                
                translated = re.sub(r"(?<!\\)'", r"\'", translated)
                elem.text = translated
                
            count += 1
            if count % 500 == 0:
                print(f"📦 Verified and Auto-Translated: {count} strings...")

        header_comment = "<!-- 👑 TAJGRAM VIP OFFICIAL TAJIK LANGUAGE SYSTEM - DEVELOPED BY CHIEF DEVELOPER SAIDJUN (2025-2030) -->\n"
        with open(target_file, 'wb') as f:
            f.write(header_comment.encode('utf-8'))
            f.write(etree.tostring(tree, pretty_print=True, xml_declaration=False, encoding='utf-8'))
            
        print(f"=== 🎉 SUCCESS: ALL {count} STRINGS TRANSLATED SECURELY ===")

    - name: Commit and Secure Push Tajgram Language
      run: |
        git config --global user.name "Saidjun Chief Developer"
        git config --global user.email "saidjun@tajgram.messenger"
        git add TMessagesProj/src/main/res/values-tg/strings.xml
        
        if git diff-index --quiet HEAD --; then
          echo "No changes in translation."
        else
          git commit -m "👑 TAJGRAM LANGUAGE: Created 100% full Tajik base from factory blueprint"
          # ПУШ КАРДАН БА ҲАМОН БРАНЧЕ, КИ ЗАПУСК ШУД (АВТОМАТИКӢ)
          git push origin HEAD
        fi

