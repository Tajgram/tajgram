name: Tajgram Auto Update and Patching

on:
  workflow_dispatch:

jobs:
  patch_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Клони лоиҳа
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_TOKEN }}
          branch: master

      - name: 🧹 Танзими Git
        run: |
          git config --global user.name "TajgramRobot"
          git config --global user.email "robot@tajgram.tj"

      - name: ⚙️ Иҷрои Патчҳо ва Навсозии API
        run: |
          # ==========================================
          # 1. ИСЛОҲИ БУНЁДИИ BaseFragment.java
          # ==========================================
          BF_FILE="TMessagesProj/src/main/java/org/telegram/ui/ActionBar/BaseFragment.java"
          
          if [ -f "$BF_FILE" ]; then
              # АВВАЛ: Тоза кардани ҳама намуди комментҳои хато (бо ===, ---, # ва /)
              sed -i '/TAJGRAM SECURITY/d' "$BF_FILE"
              sed -i '/^\s*\/$/d' "$BF_FILE"
              sed -i '/^\s*\/===\s*$/d' "$BF_FILE"
              
              # УДАЛИТИ МУТЛАҚ: Тоза кардани тамоми блоки куҳнаи if аз аввал то охир
              sed -i '/ANTI_FRAUD_DEVICE_LOCK/,/}/d' "$BF_FILE"
              sed -i '/currentSignature/,/}/d' "$BF_FILE"
              
              # НАВИШТАН: Гузоштани ягона коди наву тозаи Анти-Фрауд
              BF_CODE='// === TAJGRAM SECURITY START ===\n        if (org.telegram.messenger.BuildVars.ANTI_FRAUD_DEVICE_LOCK) {\n            String currentSignature = org.telegram.messenger.AndroidUtilities.getCurrentAppSignature(org.telegram.messenger.ApplicationLoader.applicationContext);\n            if (currentSignature != null \&\& !org.telegram.messenger.BuildVars.SHA256_KEY.equalsIgnoreCase(currentSignature)) {\n                return false;\n            }\n        }\n        // === TAJGRAM SECURITY END ==='
              
              sed -i "s/public boolean onFragmentCreate() {/public boolean onFragmentCreate() {\n        $BF_CODE/" "$BF_FILE"
              print "✅ BaseFragment бо муваффақият тоза ва патч шуд!"
          fi

          # ==========================================
          # 2. ИСЛОҲИ БУНЁДИИ ChatActivity.java
          # ==========================================
          CA_FILE="TMessagesProj/src/main/java/org/telegram/ui/ChatActivity.java"
          
          if [ -f "$CA_FILE" ]; then
              # АВВАЛ: Тоза кардани ҳама намуди комментҳои кӯҳнаи скриншот
              sed -i '/TAJGRAM SCREENSHOT/d' "$CA_FILE"
              sed -i '/^\s*\/$/d' "$CA_FILE"
              sed -i '/^\s*\/===\s*$/d' "$CA_FILE"
              
              # УДАЛИТИ МУТЛАҚ: Тоза кардани тамоми блоки куҳнаи скриншот лок (ҳамаи 3 қавси кушодаву пӯшида)
              sed -i '/ANTI_SPY_SCREENSHOT_LOCK/,/}/d' "$CA_FILE"
              sed -i '/getParentActivity().getWindow().addFlags/d' "$CA_FILE"
              
              # НАВИШТАН: Гузоштани ягона коди наву тозаи Скриншот Лок
              CA_CODE='// === TAJGRAM SCREENSHOT LOCK START ===\n        if (org.telegram.messenger.BuildVars.ANTI_SPY_SCREENSHOT_LOCK) {\n            if (getParentActivity() != null) {\n                getParentActivity().getWindow().addFlags(android.view.WindowManager.LayoutParams.FLAG_SECURE);\n            }\n        }\n        // === TAJGRAM SCREENSHOT LOCK END ==='
              
              sed -i "s/super.onResume();/super.onResume();\n        $CA_CODE/" "$CA_FILE"
              print "✅ ChatActivity бо муваффақият тоза ва патч шуд!"
          fi

      - name: 📤 Push ба GitHub
        run: |
          git add .
            git diff-index --quiet HEAD || (git commit -m "Tajgram: Auto-updated Security & API" && git push https://${{ secrets.MY_TOKEN }}@github.com/Tajgram/tajgram.git master)
